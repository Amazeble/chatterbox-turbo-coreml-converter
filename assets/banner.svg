<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img"
     aria-label="chatterbox-turbo-coreml-converter — text to speech on Apple Silicon">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="55%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#FBA8E0"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#FBA8E0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)" rx="16"/>

  <!-- Faint grid -->
  <g stroke="#A5B4FC" stroke-width="0.4" opacity="0.08">
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- Left equalizer (input/reference voice) -->
  <g transform="translate(50, 175)">
    <g>
      <rect x="0"   y="-30" width="11" height="60" rx="3" fill="url(#bar)">
        <animate attributeName="height" values="20;90;30;70;25;85;20"  dur="1.4s" repeatCount="indefinite"/>
        <animate attributeName="y"      values="-10;-45;-15;-35;-12;-42;-10" dur="1.4s" repeatCount="indefinite"/>
      </rect>
      <rect x="17"  y="-40" width="11" height="80" rx="3" fill="url(#bar)" opacity="0.95">
        <animate attributeName="height" values="70;25;90;40;75;30;70" dur="1.4s" repeatCount="indefinite"/>
        <animate attributeName="y"      values="-35;-12;-45;-20;-37;-15;-35" dur="1.4s" repeatCount="indefinite"/>
      </rect>
      <rect x="34"  y="-25" width="11" height="50" rx="3" fill="url(#bar)" opacity="0.9">
        <animate attributeName="height" values="40;80;25;70;35;55;40" dur="1.4s" repeatCount="indefinite"/>
        <animate attributeName="y"      values="-20;-40;-12;-35;-17;-27;-20" dur="1.4s" repeatCount="indefinite"/>
      </rect>
      <rect x="51"  y="-45" width="11" height="90" rx="3" fill="url(#bar)" opacity="0.95">
        <animate attributeName="height" values="85;35;75;45;90;30;85" dur="1.4s" repeatCount="indefinite"/>
        <animate attributeName="y"      values="-42;-17;-37;-22;-45;-15;-42" dur="1.4s" repeatCount="indefinite"/>
      </rect>
      <rect x="68"  y="-30" width="11" height="60" rx="3" fill="url(#bar)" opacity="0.9">
        <animate attributeName="height" values="55;25;80;30;65;40;55" dur="1.4s" repeatCount="indefinite"/>
        <animate attributeName="y"      values="-27;-12;-40;-15;-32;-20;-27" dur="1.4s" repeatCount="indefinite"/>
      </rect>
      <rect x="85"  y="-20" width="11" height="40" rx="3" fill="url(#bar)" opacity="0.85">
        <animate attributeName="height" values="30;65;20;50;25;45;30" dur="1.4s" repeatCount="indefinite"/>
        <animate attributeName="y"      values="-15;-32;-10;-25;-12;-22;-15" dur="1.4s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- Flowing waveform connecting left to right -->
  <g transform="translate(170, 175)">
    <path d="M0,0 Q40,-20 80,0 T160,0 T240,0 T320,0 T400,0 T480,0 T560,0 T640,0 T720,0 T800,0 T860,0"
          stroke="url(#wave)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7">
      <animate attributeName="d" dur="3.4s" repeatCount="indefinite"
        values="M0,0 Q40,-20 80,0 T160,0 T240,0 T320,0 T400,0 T480,0 T560,0 T640,0 T720,0 T800,0 T860,0;
                M0,0 Q40, 20 80,0 T160,0 T240,0 T320,0 T400,0 T480,0 T560,0 T640,0 T720,0 T800,0 T860,0;
                M0,0 Q40,-20 80,0 T160,0 T240,0 T320,0 T400,0 T480,0 T560,0 T640,0 T720,0 T800,0 T860,0"/>
    </path>
    <path d="M0,0 Q40,-12 80,0 T160,0 T240,0 T320,0 T400,0 T480,0 T560,0 T640,0 T720,0 T800,0 T860,0"
          stroke="url(#wave)" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.45">
      <animate attributeName="d" dur="2.2s" repeatCount="indefinite"
        values="M0,0 Q40,-12 80,0 T160,0 T240,0 T320,0 T400,0 T480,0 T560,0 T640,0 T720,0 T800,0 T860,0;
                M0,0 Q40, 12 80,0 T160,0 T240,0 T320,0 T400,0 T480,0 T560,0 T640,0 T720,0 T800,0 T860,0;
                M0,0 Q40,-12 80,0 T160,0 T240,0 T320,0 T400,0 T480,0 T560,0 T640,0 T720,0 T800,0 T860,0"/>
    </path>
  </g>

  <!-- Right equalizer (synthesized output) -->
  <g transform="translate(1050, 175)">
    <g>
      <rect x="0"   y="-25" width="11" height="50" rx="3" fill="url(#bar)" opacity="0.9">
        <animate attributeName="height" values="40;70;30;55;35;65;40" dur="1.4s" begin="-0.7s" repeatCount="indefinite"/>
        <animate attributeName="y"      values="-20;-35;-15;-27;-17;-32;-20" dur="1.4s" begin="-0.7s" repeatCount="indefinite"/>
      </rect>
      <rect x="17"  y="-45" width="11" height="90" rx="3" fill="url(#bar)" opacity="0.95">
        <animate attributeName="height" values="85;35;75;50;90;30;85" dur="1.4s" begin="-0.7s" repeatCount="indefinite"/>
        <animate attributeName="y"      values="-42;-17;-37;-25;-45;-15;-42" dur="1.4s" begin="-0.7s" repeatCount="indefinite"/>
      </rect>
      <rect x="34"  y="-30" width="11" height="60" rx="3" fill="url(#bar)">
        <animate attributeName="height" values="20;80;30;65;25;75;20" dur="1.4s" begin="-0.7s" repeatCount="indefinite"/>
        <animate attributeName="y"      values="-10;-40;-15;-32;-12;-37;-10" dur="1.4s" begin="-0.7s" repeatCount="indefinite"/>
      </rect>
      <rect x="51"  y="-40" width="11" height="80" rx="3" fill="url(#bar)" opacity="0.95">
        <animate attributeName="height" values="70;30;85;45;75;25;70" dur="1.4s" begin="-0.7s" repeatCount="indefinite"/>
        <animate attributeName="y"      values="-35;-15;-42;-22;-37;-12;-35" dur="1.4s" begin="-0.7s" repeatCount="indefinite"/>
      </rect>
      <rect x="68"  y="-25" width="11" height="50" rx="3" fill="url(#bar)" opacity="0.9">
        <animate attributeName="height" values="40;75;25;60;30;70;40" dur="1.4s" begin="-0.7s" repeatCount="indefinite"/>
        <animate attributeName="y"      values="-20;-37;-12;-30;-15;-35;-20" dur="1.4s" begin="-0.7s" repeatCount="indefinite"/>
      </rect>
      <rect x="85"  y="-20" width="11" height="40" rx="3" fill="url(#bar)" opacity="0.85">
        <animate attributeName="height" values="35;60;25;50;30;55;35" dur="1.4s" begin="-0.7s" repeatCount="indefinite"/>
        <animate attributeName="y"      values="-17;-30;-12;-25;-15;-27;-17" dur="1.4s" begin="-0.7s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- Title -->
  <text x="600" y="115" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif"
        font-size="56" font-weight="700" fill="url(#title)" letter-spacing="-1.5">
    chatterbox-turbo-coreml
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.6s" repeatCount="indefinite"/>
  </text>

  <!-- Subtitle -->
  <text x="600" y="148" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="14" fill="#94A3B8" letter-spacing="2">
    TEXT  →  SPEECH  ON  APPLE  SILICON  ·  iOS 18+
  </text>

  <!-- Pipeline arrows (sequential pulse) -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13"
     fill="#CBD5E1" transform="translate(190, 232)">
    <text x="0"  y="0" fill="#FBA8E0">text</text>
    <text x="55" y="0" fill="#67E8F9" font-size="18" font-weight="600">
      →
      <animate attributeName="opacity" values="0.25;1;0.25" dur="2.4s" begin="0s"    repeatCount="indefinite"/>
    </text>
    <text x="80" y="0">T3Prefill.mlpackage</text>
    <text x="245" y="0" fill="#67E8F9" font-size="18" font-weight="600">
      →
      <animate attributeName="opacity" values="0.25;1;0.25" dur="2.4s" begin="0.4s"  repeatCount="indefinite"/>
    </text>
    <text x="270" y="0">language_model.onnx</text>
    <text x="430" y="0" fill="#67E8F9" font-size="18" font-weight="600">
      →
      <animate attributeName="opacity" values="0.25;1;0.25" dur="2.4s" begin="0.8s"  repeatCount="indefinite"/>
    </text>
    <text x="455" y="0">conditional_decoder.onnx</text>
    <text x="645" y="0" fill="#67E8F9" font-size="18" font-weight="600">
      →
      <animate attributeName="opacity" values="0.25;1;0.25" dur="2.4s" begin="1.2s"  repeatCount="indefinite"/>
    </text>
    <text x="670" y="0" fill="#FBA8E0">24&#160;kHz&#160;PCM</text>
  </g>

  <!-- Bottom row badges -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="11"
     fill="#64748B" transform="translate(600, 285)" text-anchor="middle">
    <text x="0" y="0">CoreML&#160;·&#160;ONNX&#160;Runtime&#160;·&#160;M1+&#160;·&#160;Neural&#160;Engine&#160;·&#160;iPhone</text>
  </g>
</svg>
